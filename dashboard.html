<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #36d1dc, #5b86e5);
    margin: 0;
    text-align: center;
}

.navbar {
    background: #222;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.navbar a {
    color: #00f2fe;
    text-decoration: none;
    margin-left: 10px;
}

.dashboard {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 40px;
}

.card {
    background: white;
    margin: 15px;
    padding: 20px;
    width: 180px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h3 {
    color: #5b86e5;
}
</style>

</head>

<body>

<div class="navbar">
    <div>📊 Dashboard</div>
    <div>
        Welcome {{user}} |
        <a href="/">Files</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="dashboard">

    <div class="card">
        <h2>{{total_files}}</h2>
        <p>Total Files</p>
    </div>

    <div class="card">
        <h2>{{total_size}} KB</h2>
        <p>Storage Used</p>
    </div>

    <div class="card">
        <h2>{{images}}</h2>
        <p>Images</p>
    </div>

    <div class="card">
        <h2>{{docs}}</h2>
        <p>Documents</p>
    </div>

    <div class="card">
        <h2>{{others}}</h2>
        <p>Others</p>
    </div>

</div>

</body>
</html>
