<!DOCTYPE html>
<html>
<head>
    <title>Search Files</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            margin: 0;
        }

        .navbar {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: #00f2fe;
            text-decoration: none;
            margin-left: 10px;
        }

        .search-box {
            background: white;
            padding: 20px;
            width: 350px;
            margin: 40px auto;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 350px;
            border-radius: 8px;
        }

        a.action {
            margin: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .download { color: green; }
        .delete { color: red; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>🔍 Search Files</div>
    <div>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- SEARCH BOX -->
<div class="search-box">
    <form method="GET" action="/">
        <input type="text" name="search" placeholder="Search files...">
        <button type="submit">Search</button>
    </form>
</div>

<!-- RESULTS -->
<h3 style="color:white;">Search Results</h3>

<ul>
    {% for file in files %}
    <li>
        {{ file }} <br>
        <a class="action download" href="/download/{{ file }}">Download</a>
        <a class="action delete" href="/delete/{{ file }}">Delete</a>
    </li>
    {% endfor %}
</ul>

</body>
</html>
