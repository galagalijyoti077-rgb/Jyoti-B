<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: linear-gradient(to right, #43cea2, #185a9d);
            font-family: Arial;
            text-align: center;
        }

        .login-box {
            background: white;
            width: 320px;
            margin: 120px auto;
            padding: 25px;

            /* 🔥 BORDER */
            border: 3px solid #185a9d;

            /* Rounded corners */
            border-radius: 12px;

            /* Shadow for better look */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #43cea2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2bbd90;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>

        <button type="submit">Login</button>
    </form>

    <a href="/register">Create account</a>
</div>

</body>
</html>
